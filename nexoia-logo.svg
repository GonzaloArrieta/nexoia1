<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F8EF7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A5CDB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F8EF7;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:#4F8EF7;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#4F8EF7;stop-opacity:0.15" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background dark pill -->
  <rect x="0" y="0" width="400" height="120" rx="16" fill="#0A0F1E"/>

  <!-- Subtle background glow behind icon -->
  <ellipse cx="60" cy="60" rx="48" ry="44" fill="url(#glowGrad)" opacity="0.6"/>

  <!-- ICON: Neural/circuit hexagon mark -->
  <!-- Outer hexagon -->
  <polygon points="60,18 88,34 88,66 60,82 32,66 32,34" fill="none" stroke="url(#blueGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- Inner hexagon -->
  <polygon points="60,28 80,39 80,61 60,72 40,61 40,39" fill="none" stroke="url(#blueGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Central node -->
  <circle cx="60" cy="50" r="5" fill="url(#blueGrad)" filter="url(#glow)"/>

  <!-- Neural nodes -->
  <circle cx="60" cy="28" r="2.5" fill="#4F8EF7" opacity="0.9"/>
  <circle cx="80" cy="39" r="2.5" fill="#4F8EF7" opacity="0.9"/>
  <circle cx="80" cy="61" r="2.5" fill="#4F8EF7" opacity="0.9"/>
  <circle cx="60" cy="72" r="2.5" fill="#4F8EF7" opacity="0.9"/>
  <circle cx="40" cy="61" r="2.5" fill="#4F8EF7" opacity="0.9"/>
  <circle cx="40" cy="39" r="2.5" fill="#4F8EF7" opacity="0.9"/>

  <!-- Connections from center to nodes (speed/neural) -->
  <line x1="60" y1="50" x2="60" y2="28" stroke="url(#blueGrad)" stroke-width="1" opacity="0.7" filter="url(#glow)"/>
  <line x1="60" y1="50" x2="80" y2="39" stroke="url(#blueGrad)" stroke-width="1" opacity="0.7" filter="url(#glow)"/>
  <line x1="60" y1="50" x2="80" y2="61" stroke="url(#blueGrad)" stroke-width="1" opacity="0.7" filter="url(#glow)"/>
  <line x1="60" y1="50" x2="60" y2="72" stroke="url(#blueGrad)" stroke-width="1" opacity="0.7" filter="url(#glow)"/>
  <line x1="60" y1="50" x2="40" y2="61" stroke="url(#blueGrad)" stroke-width="1" opacity="0.7" filter="url(#glow)"/>
  <line x1="60" y1="50" x2="40" y2="39" stroke="url(#blueGrad)" stroke-width="1" opacity="0.7" filter="url(#glow)"/>

  <!-- Speed accent line (motion) -->
  <line x1="32" y1="50" x2="16" y2="50" stroke="#4F8EF7" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="88" y1="50" x2="104" y2="50" stroke="#4F8EF7" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>

  <!-- WORDMARK -->
  <!-- "Nexo" -->
  <text x="118" y="65"
    font-family="'Trebuchet MS', 'Segoe UI', sans-serif"
    font-size="38"
    font-weight="700"
    letter-spacing="-1"
    fill="#FFFFFF">Nexo</text>

  <!-- "IA" in blue -->
  <text x="228" y="65"
    font-family="'Trebuchet MS', 'Segoe UI', sans-serif"
    font-size="38"
    font-weight="700"
    letter-spacing="-1"
    fill="url(#blueGrad)"
    filter="url(#glow)">IA</text>

  <!-- Tagline -->
  <text x="119" y="85"
    font-family="'Trebuchet MS', 'Segoe UI', sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="3.5"
    fill="#4F8EF7"
    opacity="0.7">AUTOMATIZACIÓN INTELIGENTE</text>

  <!-- Thin separator line under wordmark -->
  <line x1="118" y1="70" x2="290" y2="70" stroke="#4F8EF7" stroke-width="0.5" opacity="0.2"/>
</svg>
